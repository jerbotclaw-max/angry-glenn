<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Angry Glenn</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #87CEEB; font-family: 'Arial', sans-serif; }
canvas { display: block; touch-action: none; }
#ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
.score-display {
  position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
  font-family: 'Arial Black', sans-serif; font-size: 28px; color: #fff;
  text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
  pointer-events: none; z-index: 10;
}
.birds-display {
  position: absolute; top: 15px; left: 15px;
  font-family: 'Arial Black', sans-serif; font-size: 22px; color: #fff;
  text-shadow: 2px 2px 0 #000; z-index: 10;
}
.level-display {
  position: absolute; top: 15px; right: 15px;
  font-family: 'Arial Black', sans-serif; font-size: 22px; color: #fff;
  text-shadow: 2px 2px 0 #000; z-index: 10;
}
.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.65); pointer-events: auto; z-index: 20;
}
.overlay h1 {
  font-family: 'Arial Black', sans-serif; font-size: 64px; color: #FFD700;
  text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
  margin-bottom: 10px; text-align: center;
}
.overlay p {
  font-family: 'Arial', sans-serif; font-size: 22px; color: #fff;
  text-shadow: 2px 2px 0 #000; margin-bottom: 20px; text-align: center; line-height: 1.5;
}
.overlay button {
  font-family: 'Arial Black', sans-serif; font-size: 22px; padding: 15px 40px;
  background: #4CAF50; color: white; border: 4px solid #2E7D32; border-radius: 12px;
  cursor: pointer; text-shadow: 2px 2px 0 #000; transition: transform 0.1s; margin: 5px;
}
.overlay button:active { transform: scale(0.95); }
.hidden { display: none !important; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div class="birds-display" id="birdsDisplay">Birds: 3</div>
  <div class="score-display" id="scoreDisplay">Score: 0</div>
  <div class="level-display" id="levelDisplay">Level 1</div>
</div>
<div class="overlay" id="startScreen">
  <h1>ANGRY GLENN</h1>
  <p>Drag the bird back to aim. Release to launch!<br>Knock down all the Glenns to win!</p>
  <button onclick="startGame()">PLAY</button>
</div>
<div class="overlay hidden" id="winScreen">
  <h1>You Win!</h1>
  <p id="winScore">Score: 0</p>
  <button onclick="nextLevel()">Next Level</button>
  <button onclick="restartGame()" style="background:#2196F3;border-color:#1565C0">Restart</button>
</div>
<div class="overlay hidden" id="loseScreen">
  <h1>Game Over</h1>
  <p id="loseScore">Score: 0</p>
  <button onclick="restartGame()">Try Again</button>
</div>

// ===== CANVAS SETUP =====
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, GROUND_Y = 0, SCALE = 1;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  GROUND_Y = H - Math.max(60, H * 0.08);
  SCALE = Math.min(W / 900, H / 600);
  SCALE = Math.max(SCALE, 0.5);
}
window.addEventListener('resize', resize);
resize();

// ===== AUDIO =====
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
}
function playSound(freq, duration, type, vol) {
  if (!audioCtx) return;
  type = type || 'sine'; vol = vol || 0.3; duration = duration || 0.15;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}
function sndLaunch() { playSound(300, 0.2, 'sawtooth', 0.2); setTimeout(()=>playSound(200,0.15,'sawtooth',0.15),50); }
function sndHit() { playSound(150, 0.1, 'square', 0.25); }
function sndDestroy() { playSound(80, 0.3, 'sawtooth', 0.2); setTimeout(()=>playSound(60,0.2,'sawtooth',0.15),80); }
function sndWin() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playSound(f,0.2,'sine',0.3),i*120)); }
function sndLose() { [400,300,200,100].forEach((f,i)=>setTimeout(()=>playSound(f,0.25,'sawtooth',0.25),i*150)); }

// ===== PHYSICS =====
const GRAVITY = 0.5 * (SCALE);
const FRICTION = 0.98;       // air friction (unchanged)
const RESTITUTION = 0.05;    // was 0.3 — near-zero bounce on everything
const SETTLE_VEL = 0.6;      // velocity below this counts as "resting"
const SETTLE_FRAMES = 45;    // ~0.75s of stillness before next bird
const MAX_TURN_FRAMES = 480; // 8 seconds at 60fps — force-end turn after this
const GROUND_FRICTION = 0.80; // extra friction multiplier on ground contact
let turnTimer = 0;            // counts up during flying/settled phase

class PhysicsBody {
  constructor(x, y, w, h, isStatic, type) {
    this.x = x; this.y = y;
    this.w = w; this.h = h;
    this.vx = 0; this.vy = 0;
    this.isStatic = isStatic || false;
    this.type = type || 'block';
    this.alive = true;
    this.angle = 0;
    this.angularVel = 0;
    this.mass = isStatic ? Infinity : (w * h) / 1000;
    this.hitFlash = 0;
  }
  
  update() {
    if (this.isStatic || !this.alive) return;
    this.vy += GRAVITY;
    this.vx *= 0.995;
    this.x += this.vx;
    this.y += this.vy;
    this.angle += this.angularVel;
    this.angularVel *= 0.92;
    
    // Ground collision
    if (this.y + this.h > GROUND_Y) {
      this.y = GROUND_Y - this.h;
      if (Math.abs(this.vy) > SETTLE_VEL) {
        this.vy *= -RESTITUTION;
        this.angularVel += this.vx * 0.01;
      } else { this.vy = 0; }
      this.vx *= GROUND_FRICTION;
      if (Math.abs(this.vx) < 0.3) this.vx = 0;
    }
    
    // Walls
    if (this.x < 0) { this.x = 0; this.vx *= -RESTITUTION; }
    if (this.x + this.w > W) { this.x = W - this.w; this.vx *= -RESTITUTION; }
    
    // Progressive settle: dampen slow-moving objects so they stop
    const spd = Math.abs(this.vx) + Math.abs(this.vy);
    if (spd < 2.0) {
      this.vx *= 0.90;
      this.vy *= 0.90;
      this.angularVel *= 0.85;
      if (Math.abs(this.vx) < 0.15) this.vx = 0;
      if (Math.abs(this.angularVel) < 0.005) this.angularVel = 0;
    }
    
    if (this.hitFlash > 0) this.hitFlash--;
  }
  
  intersects(other) {
    return this.x < other.x + other.w && this.x + this.w > other.x &&
           this.y < other.y + other.h && this.y + this.h > other.y;
  }
}

// ===== GAME STATE =====
let bodies = [];
let bird = null;
let targets = [];
let clouds = [];
let particles = [];
let score = 0;
let birdsLeft = 3;
let level = 1;
let gameState = 'menu'; // menu, aiming, flying, settled, win, lose
let dragStart = null;
let dragCurrent = null;
let isDragging = false;
let settleTimer = 0;
let trajectoryPoints = [];

const SLINGSHOT_X_RATIO = 0.15;
const MAX_DRAG = 120;
const LAUNCH_POWER = 0.20;

function getSlingX() { return W * SLINGSHOT_X_RATIO; }
function getSlingY() { return GROUND_Y - 80 * SCALE; }

// Clouds
function initClouds() {
  clouds = [];
  for (let i = 0; i < 6; i++) {
    clouds.push({
      x: Math.random() * W,
      y: 30 + Math.random() * (H * 0.35),
      size: 40 + Math.random() * 60,
      speed: 0.1 + Math.random() * 0.2,
      opacity: 0.6 + Math.random() * 0.3
    });
  }
}

// ===== LEVELS =====
function buildLevel(lvl) {
  bodies = [];
  targets = [];
  particles = [];
  trajectoryPoints = [];
  
  const sx = getSlingX();
  const baseX = W * 0.6;
  const blockW = 40 * SCALE;
  const blockH = 40 * SCALE;
  
  if (lvl === 1) {
    // Simple tower
    for (let i = 0; i < 4; i++) {
      bodies.push(new PhysicsBody(baseX, GROUND_Y - blockH * (i+1), blockW, blockH, false, 'wood'));
    }
    // Targets on top
    targets.push(new PhysicsBody(baseX + blockW + 10, GROUND_Y - blockH * 4, 35*SCALE, 35*SCALE, false, 'target'));
    targets.push(new PhysicsBody(baseX - blockW - 5, GROUND_Y - blockH, 35*SCALE, 35*SCALE, false, 'target'));
    bodies.push(...targets);
    // Ground blocks
    bodies.push(new PhysicsBody(baseX + blockW, GROUND_Y - blockH, blockW, blockH, false, 'stone'));
    bodies.push(new PhysicsBody(baseX + blockW, GROUND_Y - blockH*2, blockW, blockH, false, 'stone'));
  } else if (lvl === 2) {
    // Double tower with bridge
    for (let i = 0; i < 3; i++) {
      bodies.push(new PhysicsBody(baseX, GROUND_Y - blockH * (i+1), blockW, blockH, false, 'wood'));
      bodies.push(new PhysicsBody(baseX + blockW*3, GROUND_Y - blockH * (i+1), blockW, blockH, false, 'wood'));
    }
    // Bridge
    bodies.push(new PhysicsBody(baseX + blockW, GROUND_Y - blockH*3, blockW*2, blockH*0.6, false, 'stone'));
    // Targets
    targets.push(new PhysicsBody(baseX + blockW, GROUND_Y - blockH*4, 35*SCALE, 35*SCALE, false, 'target'));
    targets.push(new PhysicsBody(baseX + blockW*2 + 5, GROUND_Y - blockH*4, 35*SCALE, 35*SCALE, false, 'target'));
    targets.push(new PhysicsBody(baseX + blockW*4, GROUND_Y - blockH, 35*SCALE, 35*SCALE, false, 'target'));
    bodies.push(...targets);
  } else {
    // Level 3+: Pyramid fortress
    const rows = Math.min(3 + lvl, 6);
    for (let row = 0; row < rows; row++) {
      const count = rows - row;
      for (let col = 0; col < count; col++) {
        const bx = baseX + col * blockW + row * blockW * 0.5;
        const by = GROUND_Y - blockH * (row + 1);
        const t = (row + col) % 2 === 0 ? 'wood' : 'stone';
        bodies.push(new PhysicsBody(bx, by, blockW, blockH, false, t));
      }
    }
    // Targets scattered
    targets.push(new PhysicsBody(baseX + blockW*2, GROUND_Y - blockH, 35*SCALE, 35*SCALE, false, 'target'));
    targets.push(new PhysicsBody(baseX + blockW, GROUND_Y - blockH*(rows+1), 35*SCALE, 35*SCALE, false, 'target'));
    targets.push(new PhysicsBody(baseX + blockW*3, GROUND_Y - blockH, 35*SCALE, 35*SCALE, false, 'target'));
    if (lvl >= 4) {
      targets.push(new PhysicsBody(baseX + blockW*2, GROUND_Y - blockH*(rows), 35*SCALE, 35*SCALE, false, 'target'));
    }
    bodies.push(...targets);
  }
  
  // Ground (static)
  bodies.push(new PhysicsBody(0, GROUND_Y, W, H - GROUND_Y, true, 'ground'));
  
  resetBird();
}

function resetBird() {
  const sx = getSlingX();
  const sy = getSlingY();
  bird = {
    x: sx, y: sy - 20*SCALE,
    vx: 0, vy: 0,
    radius: 22 * SCALE,
    launched: false,
    settled: false
  };
  gameState = 'aiming';
  turnTimer = 0;
  settleTimer = 0;
}

// ===== INPUT =====
function getEventPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches && e.touches.length > 0) {
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function onPointerDown(e) {
  e.preventDefault();
  initAudio();
  if (gameState !== 'aiming' || !bird) return;
  const pos = getEventPos(e);
  const dx = pos.x - bird.x;
  const dy = pos.y - bird.y;
  if (Math.sqrt(dx*dx + dy*dy) < bird.radius * 3) {
    isDragging = true;
    dragStart = { x: bird.x, y: bird.y };
    dragCurrent = pos;
  }
}

function onPointerMove(e) {
  e.preventDefault();
  if (!isDragging) return;
  const pos = getEventPos(e);
  // Clamp drag distance
  const dx = pos.x - dragStart.x;
  const dy = pos.y - dragStart.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > MAX_DRAG * SCALE) {
    const angle = Math.atan2(dy, dx);
    dragCurrent = {
      x: dragStart.x + Math.cos(angle) * MAX_DRAG * SCALE,
      y: dragStart.y + Math.sin(angle) * MAX_DRAG * SCALE
    };
  } else {
    dragCurrent = pos;
  }
  // Update bird position to follow drag
  bird.x = dragCurrent.x;
  bird.y = dragCurrent.y;
  // Calculate trajectory
  updateTrajectory();
}

function onPointerUp(e) {
  e.preventDefault();
  if (!isDragging) return;
  isDragging = false;
  
  const dx = dragStart.x - bird.x;
  const dy = dragStart.y - bird.y;
  const power = Math.sqrt(dx*dx + dy*dy);
  
  if (power < 10) {
    // Not enough drag, reset bird
    bird.x = dragStart.x;
    bird.y = dragStart.y;
    trajectoryPoints = [];
    return;
  }
  
  // Launch!
  bird.vx = dx * LAUNCH_POWER;
  bird.vy = dy * LAUNCH_POWER;
  bird.launched = true;
  gameState = 'flying';
  trajectoryPoints = [];
  birdsLeft--;
  turnTimer = 0;
  settleTimer = 0;
  sndLaunch();
  updateUI();
}

function updateTrajectory() {
  trajectoryPoints = [];
  const dx = dragStart.x - bird.x;
  const dy = dragStart.y - bird.y;
  const vx = dx * LAUNCH_POWER;
  const vy = dy * LAUNCH_POWER;
  let px = bird.x, py = bird.y, pvx = vx, pvy = vy;
  for (let i = 0; i < 60; i++) {
    px += pvx;
    py += pvy;
    pvy += GRAVITY;
    if (i % 3 === 0) trajectoryPoints.push({ x: px, y: py });
    if (py > GROUND_Y || px > W || px < 0) break;
  }
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, { passive: false });
canvas.addEventListener('touchmove', onPointerMove, { passive: false });
canvas.addEventListener('touchend', onPointerUp, { passive: false });

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (gameState === 'win' || gameState === 'lose') restartGame();
  }
});

// ===== COLLISION =====
function checkCollisions() {
  if (!bird || !bird.launched) return;
  
  for (let body of bodies) {
    if (!body.alive || body.isStatic) continue;
    if (body.type === 'ground') continue;
    
    // Circle-rect collision
    const cx = Math.max(body.x, Math.min(bird.x, body.x + body.w));
    const cy = Math.max(body.y, Math.min(bird.y, body.y + body.h));
    const dx = bird.x - cx;
    const dy = bird.y - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    
    if (dist < bird.radius) {
      // Collision!
      const speed = Math.sqrt(bird.vx*bird.vx + bird.vy*bird.vy);
      
      // Push the block (stronger transfer for better feel)
      const force = speed * 0.7;
      if (Math.abs(dx) > Math.abs(dy)) {
        body.vx += (dx > 0 ? 1 : -1) * force * 0.3;
        bird.vx *= -RESTITUTION;
      } else {
        body.vy += (dy > 0 ? 1 : -1) * force * 0.3;
        bird.vy *= -RESTITUTION;
      }
      body.angularVel += (Math.random() - 0.5) * 0.2;
      body.hitFlash = 5;
      
      // Damage targets
      if (body.type === 'target' && speed > 3) {
        body.alive = false;
        score += 500;
        sndDestroy();
        spawnParticles(body.x + body.w/2, body.y + body.h/2, '#F5D5B5', 15);
        updateUI();
      } else if (speed > 2) {
        sndHit();
        if (body.type === 'target') {
          score += 50;
          updateUI();
        }
      }
      
      // Slow down bird slightly
      bird.vx *= 0.85;
      bird.vy *= 0.85;
      
      // Separate
      const overlap = bird.radius - dist;
      if (dist > 0) {
        bird.x += (dx/dist) * overlap;
        bird.y += (dy/dist) * overlap;
      }
    }
  }
  
  // Ground collision for bird
  if (bird.y + bird.radius > GROUND_Y) {
    bird.y = GROUND_Y - bird.radius;
    bird.vy *= -RESTITUTION;
    bird.vx *= GROUND_FRICTION;
    if (Math.abs(bird.vy) < SETTLE_VEL) bird.vy = 0;
  }
  
  // Walls
  if (bird.x - bird.radius < 0) { bird.x = bird.radius; bird.vx *= -RESTITUTION; }
  if (bird.x + bird.radius > W) { bird.x = W - bird.radius; bird.vx *= -RESTITUTION; }
}

// Block-block collisions (simplified)
function checkBlockCollisions() {
  for (let i = 0; i < bodies.length; i++) {
    for (let j = i+1; j < bodies.length; j++) {
      const a = bodies[i], b = bodies[j];
      if (!a.alive || !b.alive) continue;
      if (a.isStatic && b.isStatic) continue;
      
      if (a.intersects(b)) {
        // Simple resolution
        const dx = (a.x + a.w/2) - (b.x + b.w/2);
        const dy = (a.y + a.h/2) - (b.y + b.h/2);
        const ow = Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x);
        const oh = Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y);
        
        if (ow < oh) {
          // Horizontal resolution
          const push = ow / 2;
          if (!a.isStatic) { a.x += dx > 0 ? push : -push; a.vx += dx > 0 ? 0.5 : -0.5; }
          if (!b.isStatic) { b.x += dx > 0 ? -push : push; b.vx += dx > 0 ? -0.5 : 0.5; }
          // Damage check
          const relSpeed = Math.abs(a.vx - b.vx);
          if (a.type === 'target' && relSpeed > 4) {
            a.alive = false; score += 500; sndDestroy();
            spawnParticles(a.x + a.w/2, a.y + a.h/2, '#F5D5B5', 15);
            updateUI();
          }
          if (b.type === 'target' && relSpeed > 4) {
            b.alive = false; score += 500; sndDestroy();
            spawnParticles(b.x + b.w/2, b.y + b.h/2, '#F5D5B5', 15);
            updateUI();
          }
        } else {
          // Vertical resolution
          const push = oh / 2;
          if (!a.isStatic) { a.y += dy > 0 ? push : -push; a.vy += dy > 0 ? 0.5 : -0.5; }
          if (!b.isStatic) { b.y += dy > 0 ? -push : push; b.vy += dy > 0 ? -0.5 : 0.5; }
          const relSpeed = Math.abs(a.vy - b.vy);
          if (a.type === 'target' && relSpeed > 4) {
            a.alive = false; score += 500; sndDestroy();
            spawnParticles(a.x + a.w/2, a.y + a.h/2, '#F5D5B5', 15);
            updateUI();
          }
          if (b.type === 'target' && relSpeed > 4) {
            b.alive = false; score += 500; sndDestroy();
            spawnParticles(b.x + b.w/2, b.y + b.h/2, '#F5D5B5', 15);
            updateUI();
          }
        }
      }
    }
  }
}

// ===== PARTICLES =====
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color: color,
      size: 3 + Math.random() * 4
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ===== UI =====
function updateUI() {
  document.getElementById('scoreDisplay').textContent = 'Score: ' + score;
  document.getElementById('birdsDisplay').textContent = 'Birds: ' + Math.max(0, birdsLeft);
  document.getElementById('levelDisplay').textContent = 'Level ' + level;
}

function allSettled() {
  // Check if all dynamic bodies + bird have effectively stopped
  for (let body of bodies) {
    if (!body.alive || body.isStatic) continue;
    if (body.type === 'ground') continue;
    const spd = Math.abs(body.vx) + Math.abs(body.vy) + Math.abs(body.angularVel);
    if (spd > SETTLE_VEL) return false;
  }
  if (bird && bird.launched) {
    const spd = Math.abs(bird.vx) + Math.abs(bird.vy);
    if (spd > SETTLE_VEL) return false;
  }
  return true;
}

function endTurn(aliveTargets) {
  settleTimer = 0;
  turnTimer = 0;
  if (aliveTargets.length === 0) return; // win handled elsewhere
  if (birdsLeft > 0) {
    resetBird();
  } else {
    gameState = 'lose';
    sndLose();
    setTimeout(() => {
      document.getElementById('loseScore').textContent = 'Score: ' + score;
      document.getElementById('loseScreen').classList.remove('hidden');
    }, 1000);
  }
}

function checkWinLose() {
  const aliveTargets = targets.filter(t => t.alive);
  
  if (aliveTargets.length === 0 && gameState !== 'win') {
    gameState = 'win';
    score += birdsLeft * 1000;
    sndWin();
    setTimeout(() => {
      document.getElementById('winScore').textContent = 'Score: ' + score;
      document.getElementById('winScreen').classList.remove('hidden');
    }, 800);
    return;
  }
  
  if (gameState === 'flying' || gameState === 'settled') {
    turnTimer++;
    
    // Check if bird is off-screen
    if (bird && (bird.x > W + 50 || bird.x < -50 || bird.y > H + 50)) {
      settleTimer++;
      if (settleTimer > 20) { endTurn(aliveTargets); return; }
    } else if (allSettled()) {
      // Everything stopped moving
      settleTimer++;
      if (settleTimer > SETTLE_FRAMES) { endTurn(aliveTargets); return; }
    } else {
      settleTimer = 0;
    }
    
    // Force-end turn after MAX_TURN_FRAMES regardless
    if (turnTimer > MAX_TURN_FRAMES) {
      endTurn(aliveTargets);
    }
  }
}

// ===== GAME FLOW =====
function startGame() {
  initAudio();
  document.getElementById('startScreen').classList.add('hidden');
  score = 0;
  birdsLeft = 3;
  level = 1;
  buildLevel(level);
  updateUI();
}

function restartGame() {
  document.getElementById('winScreen').classList.add('hidden');
  document.getElementById('loseScreen').classList.add('hidden');
  score = 0;
  birdsLeft = 3;
  level = 1;
  buildLevel(level);
  updateUI();
}

function nextLevel() {
  document.getElementById('winScreen').classList.add('hidden');
  level++;
  birdsLeft = 3;
  buildLevel(level);
  updateUI();
}

// ===== RENDERING =====
function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, '#4FC3F7');
  grad.addColorStop(1, '#81D4FA');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);
  
  // Clouds
  for (let cloud of clouds) {
    ctx.fillStyle = 'rgba(255,255,255,' + cloud.opacity + ')';
    drawCloud(cloud.x, cloud.y, cloud.size);
    cloud.x += cloud.speed;
    if (cloud.x > W + cloud.size * 2) cloud.x = -cloud.size * 2;
  }
  
  // Distant hills (parallax)
  ctx.fillStyle = '#81C784';
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  for (let x = 0; x <= W; x += 20) {
    ctx.lineTo(x, GROUND_Y - 30 - Math.sin(x * 0.01) * 20 - Math.sin(x * 0.03) * 10);
  }
  ctx.lineTo(W, GROUND_Y);
  ctx.fill();
}

function drawCloud(x, y, size) {
  ctx.beginPath();
  ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
  ctx.arc(x + size * 0.4, y - size * 0.1, size * 0.4, 0, Math.PI * 2);
  ctx.arc(x + size * 0.8, y, size * 0.45, 0, Math.PI * 2);
  ctx.arc(x + size * 0.3, y + size * 0.15, size * 0.35, 0, Math.PI * 2);
  ctx.fill();
}

function drawGround() {
  // Dirt
  ctx.fillStyle = '#8D6E63';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  
  // Grass strip
  ctx.fillStyle = '#66BB6A';
  ctx.fillRect(0, GROUND_Y - 4, W, 12);
  
  // Grass blades
  ctx.strokeStyle = '#4CAF50';
  ctx.lineWidth = 2;
  for (let x = 0; x < W; x += 15) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y + 2);
    ctx.lineTo(x + 2, GROUND_Y - 4);
    ctx.stroke();
  }
  
  // Dirt texture dots
  ctx.fillStyle = '#6D4C41';
  for (let i = 0; i < 30; i++) {
    const px = (i * 37) % W;
    const py = GROUND_Y + 15 + (i * 23) % (H - GROUND_Y - 20);
    ctx.beginPath();
    ctx.arc(px, py, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawSlingshot() {
  const sx = getSlingX();
  const sy = getSlingY();
  
  // Back band (behind bird)
  if (gameState === 'aiming' && bird && !isDragging) {
    ctx.strokeStyle = '#5D4037';
    ctx.lineWidth = 8 * SCALE;
    ctx.beginPath();
    ctx.moveTo(sx + 12*SCALE, sy - 25*SCALE);
    ctx.lineTo(sx + 12*SCALE, sy + 10*SCALE);
    ctx.stroke();
  }
  
  // Slingshot wood frame
  ctx.fillStyle = '#5D4037';
  ctx.strokeStyle = '#3E2723';
  ctx.lineWidth = 2;
  
  // Base/trunk
  const trunkW = 14 * SCALE;
  const trunkH = 80 * SCALE;
  ctx.fillRect(sx - trunkW/2, sy - 10*SCALE, trunkW, trunkH + 10*SCALE);
  ctx.strokeRect(sx - trunkW/2, sy - 10*SCALE, trunkW, trunkH + 10*SCALE);
  
  // Left fork
  ctx.beginPath();
  ctx.moveTo(sx - trunkW/2, sy - 5*SCALE);
  ctx.lineTo(sx - 20*SCALE, sy - 30*SCALE);
  ctx.lineTo(sx - 10*SCALE, sy - 30*SCALE);
  ctx.lineTo(sx, sy - 5*SCALE);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  
  // Right fork
  ctx.beginPath();
  ctx.moveTo(sx + trunkW/2, sy - 5*SCALE);
  ctx.lineTo(sx + 20*SCALE, sy - 30*SCALE);
  ctx.lineTo(sx + 10*SCALE, sy - 30*SCALE);
  ctx.lineTo(sx, sy - 5*SCALE);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  
  // Band if dragging
  if (isDragging && bird) {
    // Left band
    ctx.strokeStyle = '#3E2723';
    ctx.lineWidth = 5 * SCALE;
    ctx.beginPath();
    ctx.moveTo(sx - 12*SCALE, sy - 28*SCALE);
    ctx.lineTo(bird.x - 5, bird.y);
    ctx.stroke();
    // Right band
    ctx.beginPath();
    ctx.moveTo(sx + 12*SCALE, sy - 28*SCALE);
    ctx.lineTo(bird.x + 5, bird.y);
    ctx.stroke();
  }
}

function drawBird() {
  if (!bird || !bird.launched) {
    // Draw waiting bird at slingshot
    if (bird && gameState === 'aiming') {
      drawGlennFace(bird.x, bird.y, bird.radius);
    }
    return;
  }
  
  drawGlennFace(bird.x, bird.y, bird.radius);
}

function drawGlennFace(x, y, radius) {
  ctx.save();
  
  // Try to draw the Glenn image
  if (GLENN_IMG.complete && GLENN_IMG.naturalWidth > 0) {
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(GLENN_IMG, x - radius, y - radius, radius * 2, radius * 2);
  } else {
    // Fallback: angry bird circle
    ctx.fillStyle = '#FF5252';
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
    
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x - radius*0.3, y - radius*0.2, radius*0.25, 0, Math.PI*2);
    ctx.arc(x + radius*0.3, y - radius*0.2, radius*0.25, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(x - radius*0.25, y - radius*0.15, radius*0.12, 0, Math.PI*2);
    ctx.arc(x + radius*0.35, y - radius*0.15, radius*0.12, 0, Math.PI*2);
    ctx.fill();
    
    // Beak
    ctx.fillStyle = '#FF9800';
    ctx.beginPath();
    ctx.moveTo(x - radius*0.2, y + radius*0.1);
    ctx.lineTo(x + radius*0.4, y + radius*0.05);
    ctx.lineTo(x - radius*0.1, y + radius*0.35);
    ctx.closePath();
    ctx.fill();
    
    // Angry eyebrows
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x - radius*0.5, y - radius*0.4);
    ctx.lineTo(x - radius*0.1, y - radius*0.3);
    ctx.moveTo(x + radius*0.1, y - radius*0.3);
    ctx.lineTo(x + radius*0.5, y - radius*0.4);
    ctx.stroke();
  }
  
  ctx.restore();
}

function drawBlocks() {
  for (let body of bodies) {
    if (!body.alive) continue;
    if (body.type === 'ground') continue;
    
    ctx.save();
    ctx.translate(body.x + body.w/2, body.y + body.h/2);
    ctx.rotate(body.angle);
    
    const flash = body.hitFlash > 0 ? body.hitFlash / 5 : 0;
    
    if (body.type === 'wood') {
      ctx.fillStyle = '#D7CCC8';
      ctx.fillRect(-body.w/2, -body.h/2, body.w, body.h);
      ctx.strokeStyle = '#8D6E63';
      ctx.lineWidth = 2;
      ctx.strokeRect(-body.w/2, -body.h/2, body.w, body.h);
      // Wood grain
      ctx.strokeStyle = '#A1887F';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-body.w/2 + 4, -body.h/2 + body.h * 0.3);
      ctx.lineTo(body.w/2 - 4, -body.h/2 + body.h * 0.3);
      ctx.moveTo(-body.w/2 + 4, -body.h/2 + body.h * 0.7);
      ctx.lineTo(body.w/2 - 4, -body.h/2 + body.h * 0.7);
      ctx.stroke();
    } else if (body.type === 'stone') {
      ctx.fillStyle = '#BDBDBD';
      ctx.fillRect(-body.w/2, -body.h/2, body.w, body.h);
      ctx.strokeStyle = '#757575';
      ctx.lineWidth = 2;
      ctx.strokeRect(-body.w/2, -body.h/2, body.w, body.h);
      // Stone texture
      ctx.fillStyle = '#9E9E9E';
      ctx.beginPath();
      ctx.arc(-body.w*0.2, -body.h*0.2, 3, 0, Math.PI*2);
      ctx.arc(body.w*0.15, body.h*0.1, 2, 0, Math.PI*2);
      ctx.fill();
    } else if (body.type === 'target') {
      // Target - cartoon Glenn face
      const cx = 0, cy = 0;
      const r = body.w / 2;
      
      // Face circle (skin tone)
      ctx.fillStyle = '#F5D5B5';
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#D4A76A';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // Short dark hair tuft on top
      ctx.fillStyle = '#3E2723';
      ctx.beginPath();
      ctx.arc(cx, cy - r*0.7, r*0.55, Math.PI*1.15, Math.PI*1.85);
      ctx.fill();
      // Hair tuft sticking up
      ctx.beginPath();
      ctx.moveTo(cx - r*0.15, cy - r*0.85);
      ctx.quadraticCurveTo(cx, cy - r*1.15, cx + r*0.15, cy - r*0.85);
      ctx.fill();
      
      // Big friendly eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(cx - r*0.3, cy - r*0.15, r*0.24, 0, Math.PI*2);
      ctx.arc(cx + r*0.3, cy - r*0.15, r*0.24, 0, Math.PI*2);
      ctx.fill();
      // Pupils
      ctx.fillStyle = '#2196F3';
      ctx.beginPath();
      ctx.arc(cx - r*0.28, cy - r*0.12, r*0.12, 0, Math.PI*2);
      ctx.arc(cx + r*0.32, cy - r*0.12, r*0.12, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(cx - r*0.27, cy - r*0.11, r*0.06, 0, Math.PI*2);
      ctx.arc(cx + r*0.33, cy - r*0.11, r*0.06, 0, Math.PI*2);
      ctx.fill();
      
      // Wide smile
      ctx.strokeStyle = '#C62828';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(cx, cy + r*0.2, r*0.4, Math.PI*0.15, Math.PI*0.85);
      ctx.stroke();
      // Smile fill (open mouth look)
      ctx.fillStyle = '#E53935';
      ctx.beginPath();
      ctx.arc(cx, cy + r*0.2, r*0.35, Math.PI*0.18, Math.PI*0.82);
      ctx.fill();
      // Teeth line
      ctx.fillStyle = '#fff';
      ctx.fillRect(cx - r*0.2, cy + r*0.2, r*0.4, r*0.06);
    }
    
    if (flash > 0) {
      ctx.fillStyle = 'rgba(255,255,255,' + flash + ')';
      ctx.fillRect(-body.w/2, -body.h/2, body.w, body.h);
    }
    
    ctx.restore();
  }
}

function drawTrajectory() {
  if (!isDragging || trajectoryPoints.length === 0) return;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < trajectoryPoints.length; i++) {
    const p = trajectoryPoints[i];
    const size = 4 * SCALE * (1 - i / trajectoryPoints.length);
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(1, size), 0, Math.PI*2);
    ctx.fill();
  }
}

function drawParticles() {
  for (let p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawWaitingBirds() {
  // Show remaining birds next to slingshot
  const sx = getSlingX();
  const sy = getSlingY();
  for (let i = 0; i < birdsLeft - (gameState === 'aiming' ? 1 : 0); i++) {
    const bx = sx - 50*SCALE - i * 35*SCALE;
    const by = GROUND_Y - 20*SCALE;
    ctx.save();
    ctx.beginPath();
    ctx.arc(bx, by, 12*SCALE, 0, Math.PI*2);
    ctx.clip();
    if (GLENN_IMG.complete && GLENN_IMG.naturalWidth > 0) {
      ctx.drawImage(GLENN_IMG, bx - 12*SCALE, by - 12*SCALE, 24*SCALE, 24*SCALE);
    } else {
      ctx.fillStyle = '#FF5252';
      ctx.beginPath();
      ctx.arc(bx, by, 12*SCALE, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(bx, by, 12*SCALE, 0, Math.PI*2);
    ctx.stroke();
  }
}

// ===== MAIN LOOP =====
function update() {
  // Update blocks
  for (let body of bodies) {
    body.update();
  }
  
  // Update bird
  if (bird && bird.launched) {
    bird.vy += GRAVITY;
    bird.vx *= 0.999;
    bird.x += bird.vx;
    bird.y += bird.vy;
  }
  
  // Collisions
  checkCollisions();
  checkBlockCollisions();
  
  // Particles
  updateParticles();
  
  // Win/lose check
  checkWinLose();
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawGround();
  drawWaitingBirds();
  drawSlingshot();
  drawBlocks();
  drawTrajectory();
  drawBird();
  drawParticles();
}

function gameLoop() {
  if (gameState !== 'menu') {
    update();
    render();
  } else {
    // Still render background for menu
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    drawGround();
  }
  requestAnimationFrame(gameLoop);
}

// Start
initClouds();
buildLevel(1);
gameLoop();
</script>
